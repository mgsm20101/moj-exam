<div class="topics-page">
  <div class="page-head">
    <h1>الموضوعات</h1>
  </div>

  <form class="new-topic-form" (ngSubmit)="createTopic()">
    <div class="field">
      <label for="newTopicName">اسم الموضوع</label>
      <input id="newTopicName" type="text" placeholder="مثال: القانون المدني" [(ngModel)]="newTopicName" name="newTopicName" />
    </div>
    <div class="field">
      <label for="newTopicDisplayOrder">ترتيب العرض</label>
      <input id="newTopicDisplayOrder" type="number" min="1" [(ngModel)]="newTopicDisplayOrder" name="newTopicDisplayOrder" />
    </div>
    <button type="submit" [disabled]="isSubmitting()">إضافة موضوع</button>
  </form>

  <div class="banner-error" *ngIf="errorMessage" role="alert">{{ errorMessage }}</div>

  <table>
    <thead>
      <tr>
        <th>الاسم</th>
        <th>الترتيب</th>
        <th>عدد الأسئلة</th>
        <th>الحالة</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let topic of topics()">
        <td>{{ topic.name }}</td>
        <td>{{ topic.displayOrder }}</td>
        <td>{{ topic.questionCount }}</td>
        <td>
          <span class="badge" [ngClass]="topic.isActive ? 'badge-active' : 'badge-neutral'">
            {{ topic.isActive ? 'نشط' : 'معطّل' }}
          </span>
        </td>
        <td class="actions">
          <button type="button" class="danger" (click)="deleteTopic(topic.id)" [disabled]="isSubmitting()">حذف</button>
        </td>
      </tr>
      <tr *ngIf="topics().length === 0">
        <td colspan="5" class="table-empty">لا توجد موضوعات بعد — أضِف أول موضوع من النموذج أعلاه.</td>
      </tr>
    </tbody>
  </table>
</div>
