<app-result *ngIf="result" [result]="result" [examId]="examId"></app-result>

<!-- Full-page exam player: a sticky top bar + a two-column body (question | navigator)
     that collapses to a single column on narrow screens. -->
<div class="exam-player" *ngIf="!result && !loading && state && current">
  <header class="exam-player-topbar">
    <span class="player-timer" [class.low]="remainingSeconds < 60">
      {{ (remainingSeconds / 60) | number: '1.0-0' }}:{{ (remainingSeconds % 60) | number: '2.0-0' }}
    </span>
    <span class="exam-player-progress">السؤال {{ currentIndex + 1 }} من {{ state.questions.length }}</span>
    <button type="button" class="btn-ghost" (click)="toggleFlag()">
      {{ current.isFlagged ? 'إلغاء التعليم' : 'تعليم للمراجعة' }}
    </button>
  </header>

  <div class="exam-player-body">
    <main class="exam-player-main">
      <app-question-view [question]="current"
                         (optionSelected)="selectOption($event)"
                         (textChanged)="changeText()"></app-question-view>

      <div class="exam-player-controls">
        <div class="player-actions">
          <button type="button" class="btn-ghost" (click)="prev()" [disabled]="currentIndex === 0">السابق</button>
          <button type="button" class="btn-ghost" (click)="next()"
                  [disabled]="currentIndex === state.questions.length - 1">التالي</button>
        </div>
        <button type="button" class="btn-primary submit-btn" (click)="askConfirm()">تسليم</button>
      </div>
    </main>

    <aside class="exam-player-aside">
      <h3 class="aside-title">خريطة الأسئلة</h3>
      <app-question-navigator [questions]="state.questions" [currentIndex]="currentIndex"
                              (jump)="go($event)"></app-question-navigator>
      <div class="aside-legend">
        <span><i class="legend-dot answered"></i> مُجاب</span>
        <span><i class="legend-dot flagged"></i> معلّم للمراجعة</span>
      </div>
    </aside>
  </div>
</div>

<div class="candidate-card" *ngIf="!result && loading">
  <div class="candidate-state">جارٍ التحميل…</div>
</div>

<!-- Final-submit confirmation shown as a centered overlay over the player. -->
<div class="exam-confirm-overlay" *ngIf="confirming">
  <div class="exam-confirm-dialog" role="dialog" aria-modal="true">
    <p>لديك <strong>{{ unansweredCount }}</strong> سؤالاً بدون إجابة. هل تريد التسليم النهائي؟</p>
    <div class="exam-confirm-actions">
      <button type="button" class="btn-primary" (click)="doSubmit()" [disabled]="submitting">
        {{ submitting ? 'جارٍ التسليم…' : 'تأكيد التسليم' }}
      </button>
      <button type="button" class="btn-ghost" (click)="cancelConfirm()">رجوع</button>
    </div>
  </div>
</div>
